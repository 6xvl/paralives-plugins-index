name: Sync Direct Control (Rockz)

# Featured community mod (RockZ-01/DirectControl). This watches his repo for a new release
# and updates our manifest entry so Plugin Hub auto-updates users — no manual step needed.
# Polls every 6h; also runnable on demand from the Actions tab.

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync from upstream release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REL=$(gh release view --repo RockZ-01/DirectControl --json tagName,assets)
          VER=$(echo "$REL" | jq -r '.tagName')
          HAS_DLL=$(echo "$REL" | jq -r '[.assets[] | select(.name == "DirectControl.dll")] | length')

          if [ -z "$VER" ] || [ "$VER" = "null" ]; then echo "No upstream release — skipping."; exit 0; fi
          if [ "$HAS_DLL" = "0" ]; then echo "Release $VER has no DirectControl.dll asset — skipping."; exit 0; fi

          CUR=$(jq -r '(.plugins[] | select(.id == "rockz.paralives.directcontrol") | .version) // ""' manifest.json)
          echo "upstream=$VER  manifest=$CUR"
          if [ "$VER" = "$CUR" ]; then echo "Already up to date."; exit 0; fi

          gh release download "$VER" --repo RockZ-01/DirectControl \
            --pattern DirectControl.dll \
            --output plugins/gameplay/direct-control/DirectControl.dll --clobber

          SHA=$(sha256sum plugins/gameplay/direct-control/DirectControl.dll | cut -d' ' -f1)
          SIZE=$(stat -c%s plugins/gameplay/direct-control/DirectControl.dll)
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          jq --arg v "$VER" --arg s "$SHA" --argjson z "$SIZE" --arg u "$NOW" '
            .updated = $u
            | (.plugins[] | select(.id == "rockz.paralives.directcontrol")) |= (.version = $v | .sha256 = $s | .size_bytes = $z)
          ' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

          git config user.name "6ix"
          git config user.email "6xvl@users.noreply.github.com"
          git add manifest.json plugins/gameplay/direct-control/DirectControl.dll
          git commit -m "Direct Control auto-sync to $VER (by Rockz)"
          git push
          echo "Synced Direct Control -> $VER (sha ${SHA:0:12}, $SIZE bytes)"
