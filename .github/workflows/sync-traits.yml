name: Sync Traits (xSauroXplayer)

# Community mod (XSauroxPlayer/ParalivesTraitsProject). Watches for new releases and
# updates our manifest so Plugin Hub auto-updates users — no manual step needed.
# Polls every 6h; also runnable on demand from the Actions tab.

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync from upstream release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REL=$(gh release view --repo XSauroxPlayer/ParalivesTraitsProject --json tagName,assets)
          TAG=$(echo "$REL" | jq -r '.tagName')
          VER=$(echo "$TAG" | sed 's/^[Vv]//')
          HAS_DLL=$(echo "$REL" | jq -r '[.assets[] | select(.name == "ParalivesTraitsProject.dll")] | length')

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then echo "No upstream release — skipping."; exit 0; fi
          if [ "$HAS_DLL" = "0" ]; then echo "Release $TAG has no ParalivesTraitsProject.dll — skipping."; exit 0; fi

          CUR=$(jq -r '(.plugins[] | select(.id == "com.xsauroxplayer.paratraits") | .version) // ""' manifest.json)
          echo "upstream=$VER  manifest=$CUR"
          if [ "$VER" = "$CUR" ]; then echo "Already up to date."; exit 0; fi

          gh release download "$TAG" --repo XSauroxPlayer/ParalivesTraitsProject \
            --pattern ParalivesTraitsProject.dll \
            --output /tmp/ParalivesTraitsProject.dll --clobber

          SHA=$(sha256sum /tmp/ParalivesTraitsProject.dll | cut -d' ' -f1)
          SIZE=$(stat -c%s /tmp/ParalivesTraitsProject.dll)
          DL_URL="https://github.com/XSauroxPlayer/ParalivesTraitsProject/releases/download/${TAG}/ParalivesTraitsProject.dll"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          jq --arg v "$VER" --arg s "$SHA" --argjson z "$SIZE" --arg u "$NOW" --arg dl "$DL_URL" '
            .updated = $u
            | (.plugins[] | select(.id == "com.xsauroxplayer.paratraits")) |= (
                .version = $v | .sha256 = $s | .size_bytes = $z | .download = $dl
              )
          ' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

          git config user.name "6ix"
          git config user.email "6xvl@users.noreply.github.com"
          git add manifest.json
          git commit -m "Traits auto-sync to $VER (by xSauroXplayer)"
          git push
          echo "Synced Traits -> $VER (sha ${SHA:0:12}, $SIZE bytes)"
